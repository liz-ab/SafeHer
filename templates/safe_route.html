<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Safe Route</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #ffd6e8, #fff1f7);
}

.topbar {
    background: #c2185b;
    padding: 12px 20px;
    color: white;
    font-weight: bold;
}

.controls {
    padding: 10px;
    background: white;
    display: flex;
    gap: 10px;
}

.controls input {
    padding: 8px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

.controls button {
    padding: 8px 12px;
    background: #c2185b;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

#map {
    width: 100%;
    height: 55vh;
}

.result {
    padding: 12px;
    background: white;
}

.card {
    padding: 10px;
    border-radius: 10px;
    margin-bottom: 8px;
    font-size: 14px;
}

.safe { background: #e8f5e9; color: #2e7d32; }
.risky { background: #ffebee; color: #c62828; }

.explain-btn {
    margin-top: 8px;
    padding: 8px;
    width: 100%;
    background: #880e4f;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

.explain-box {
    margin-top: 10px;
    padding: 10px;
    border-radius: 8px;
    background: #1a1a2e;
    color: white;
    font-size: 13px;
}
</style>
</head>

<body>

<div class="topbar">🛡️ Safe Route Finder</div>

<div class="controls">
    <input id="start" placeholder="Start location">
    <input id="end" placeholder="End location">
    <button onclick="findRoutes()">Find Routes</button>
</div>

<div id="map"></div>

<div class="result" id="result"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const RISK_ZONES = {{ risk_zones | safe }};
const map = L.map('map').setView([10.5276, 76.2144], 14);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// show zones
RISK_ZONES.forEach(z => {
    let color = z.Risk_Score >= 0.7 ? 'red' : z.Risk_Score >= 0.4 ? 'orange' : 'green';
    L.circleMarker([z.Latitude, z.Longitude], {
        radius:5, color, fillColor:color, fillOpacity:0.7
    }).addTo(map);
});

let routeA = null;
let routeB = null;
let riskyZones = [];

// distance
function dist(a,b) {
    return Math.sqrt((a[0]-b[0])**2 + (a[1]-b[1])**2);
}

// score route
function scoreRoute(coords) {
    let score = 0;
    let zones = [];

    RISK_ZONES.forEach(zone => {
        coords.forEach(pt => {
            if (dist(pt, [zone.Latitude, zone.Longitude]) < 0.002) {
                score += zone.Risk_Score;
                zones.push({
                    name: zone.Area_Name,
                    lat: zone.Latitude,
                    lng: zone.Longitude
                });
            }
        });
    });

    return {score, zones};
}

// geocode
async function geocode(place) {
    const res = await fetch(`https://nominatim.openstreetmap.org/search?q=${place}&format=json&limit=1`);
    const data = await res.json();
    if (!data.length) throw new Error("Location not found");
    return {lat:+data[0].lat, lon:+data[0].lon};
}

// route
async function getRoute(coords) {
    const res = await fetch(`https://router.project-osrm.org/route/v1/driving/${coords}?overview=full&geometries=geojson`);
    const data = await res.json();
    return data.routes[0].geometry.coordinates.map(c => [c[1], c[0]]);
}

// main
async function findRoutes() {
    const s = document.getElementById("start").value;
    const e = document.getElementById("end").value;

    if (!s || !e) return alert("Enter both locations");

    try {
        const start = await geocode(s);
        const end   = await geocode(e);

        if (routeA) map.removeLayer(routeA);
        if (routeB) map.removeLayer(routeB);

        const direct = await getRoute(`${start.lon},${start.lat};${end.lon},${end.lat}`);

        const midLat = (start.lat + end.lat)/2 + 0.01;
        const midLon = (start.lon + end.lon)/2 + 0.01;

        const alt = await getRoute(`${start.lon},${start.lat};${midLon},${midLat};${end.lon},${end.lat}`);

        const resA = scoreRoute(direct);
        const resB = scoreRoute(alt);

        routeA = L.polyline(direct, {color:'red'}).addTo(map);
        routeB = L.polyline(alt, {color:'green'}).addTo(map);

        map.fitBounds(routeA.getBounds());

        const result = document.getElementById("result");

        let safer, risky;

        if (resA.score < resB.score) {
            safer = "Red route";
            risky = resB;
        } else {
            safer = "Green route";
            risky = resA;
        }

        riskyZones = risky.zones;

        result.innerHTML = `
            <div class="card safe">${safer} is safer ✅</div>
            <div class="card risky">Other route is riskier ⚠️</div>
            <button class="explain-btn" onclick="explain()">🧠 Why is this route risky?</button>
            <div id="explainBox"></div>
        `;

    } catch(err) {
        alert(err.message);
    }
}

// explain
async function explain() {
    const box = document.getElementById("explainBox");
    box.innerHTML = "Loading...";

    const res = await fetch("/explain-route", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({zones: riskyZones})
    });

    const data = await res.json();

    box.innerHTML = `
        <div class="explain-box">
            <b>${data.summary}</b><br><br>
            ${data.reasons.map(r => "• " + r).join("<br>")}
        </div>
    `;
}
</script>

</body>
</html>
