<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Safe Route</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #ffd6e8, #fff1f7);
}

.topbar {
    background: #c2185b;
    padding: 12px 20px;
    color: white;
    font-weight: bold;
}

.controls {
    padding: 10px;
    background: white;
    display: flex;
    gap: 10px;
}

.controls input {
    padding: 8px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

.controls button {
    padding: 8px 12px;
    background: #c2185b;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

#map {
    width: 100%;
    height: 60vh;
}

.result {
    padding: 12px;
    background: white;
}

.card {
    padding: 10px;
    border-radius: 10px;
    margin-bottom: 8px;
    font-size: 14px;
}

.safe { background: #e8f5e9; color: #2e7d32; }
.risky { background: #ffebee; color: #c62828; }
</style>
</head>

<body>

<div class="topbar">🛡️ Safe Route Finder</div>

<div class="controls">
    <input id="start" placeholder="Start location">
    <input id="end" placeholder="End location">
    <button onclick="findRoutes()">Find Routes</button>
</div>

<div id="map"></div>

<div class="result" id="result"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const RISK_ZONES = {{ risk_zones | safe }};

const map = L.map('map').setView([10.5276, 76.2144], 14);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// show zones
RISK_ZONES.forEach(z => {
    let color = z.Risk_Score >= 0.7 ? 'red' : z.Risk_Score >= 0.4 ? 'orange' : 'green';
    L.circleMarker([z.Latitude, z.Longitude], {
        radius:5, color, fillColor:color, fillOpacity:0.7
    }).addTo(map);
});

let routeA = null;
let routeB = null;

// ── distance between points ──
function dist(a,b) {
    return Math.sqrt((a[0]-b[0])**2 + (a[1]-b[1])**2);
}

// ── score route based on nearby risk zones ──
function scoreRoute(coords) {
    let score = 0;

    RISK_ZONES.forEach(zone => {
        coords.forEach(pt => {
            if (dist(pt, [zone.Latitude, zone.Longitude]) < 0.002) {
                score += zone.Risk_Score;
            }
        });
    });

    return score;
}

// ── geocode ──
async function geocode(place) {
    const res = await fetch(`https://nominatim.openstreetmap.org/search?q=${place}&format=json&limit=1`);
    const data = await res.json();
    if (!data.length) throw new Error("Location not found");
    return {lat:+data[0].lat, lon:+data[0].lon};
}

// ── get route ──
async function getRoute(coords) {
    const res = await fetch(`https://router.project-osrm.org/route/v1/driving/${coords}?overview=full&geometries=geojson`);
    const data = await res.json();
    return data.routes[0].geometry.coordinates.map(c => [c[1], c[0]]);
}

// ── main ──
async function findRoutes() {
    const s = document.getElementById("start").value;
    const e = document.getElementById("end").value;

    if (!s || !e) return alert("Enter both locations");

    try {
        const start = await geocode(s);
        const end   = await geocode(e);

        // remove old
        if (routeA) map.removeLayer(routeA);
        if (routeB) map.removeLayer(routeB);

        // direct route
        const direct = await getRoute(`${start.lon},${start.lat};${end.lon},${end.lat}`);

        // midpoint route (slightly different path)
        const midLat = (start.lat + end.lat)/2 + 0.01;
        const midLon = (start.lon + end.lon)/2 + 0.01;

        const alt = await getRoute(`${start.lon},${start.lat};${midLon},${midLat};${end.lon},${end.lat}`);

        const scoreA = scoreRoute(direct);
        const scoreB = scoreRoute(alt);

        // draw routes
        routeA = L.polyline(direct, {color:'red'}).addTo(map);
        routeB = L.polyline(alt, {color:'green'}).addTo(map);

        map.fitBounds(routeA.getBounds());

        // show result
        const result = document.getElementById("result");

        if (scoreA < scoreB) {
            result.innerHTML = `
                <div class="card safe">Green route is safer ✅</div>
                <div class="card risky">Red route is riskier ⚠️</div>
            `;
        } else {
            result.innerHTML = `
                <div class="card safe">Red route is safer ✅</div>
                <div class="card risky">Green route is riskier ⚠️</div>
            `;
        }

    } catch(err) {
        alert(err.message);
    }
}
</script>

</body>
</html>
